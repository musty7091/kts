{% extends "base.html" %}

{% block title %}Şifremi Unuttum - BeeCargo{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="login-form-wrapper">
    <h2 class="text-center mb-4">Şifremi Unuttum</h2>
    <p class="text-muted text-center mb-4">Şifrenizi sıfırlamak için kayıtlı e-posta adresinizi girin.</p>
    
    <form method="POST" action="{{ url_for('bp_common.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group mb-3">
            <label for="email">E-posta Adresiniz:</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="ornek@mail.com">
        </div>
        
        <div class="form-group mb-4">
            <label for="user_type">Kullanıcı Tipiniz:</label>
            <select name="user_type" id="user_type" class="form-control" required>
                <option value="isletme">İşletme</option>
                <option value="kurye">Kurye</option>
                <option value="admin">Yönetici</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Sıfırlama Bağlantısı Gönder</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{{ url_for('bp_common.index') }}">Vazgeç ve Geri Dön</a>
    </div>
</div>
{% endblock %}
